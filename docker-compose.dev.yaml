services:
  # Main Rails application server
  rails:
    container_name: chatwoot_rails_dev
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: chatwoot:development
    volumes:
      - .:/app
      - /app/node_modules
      - packs_data:/app/public/packs
      - vite_cache:/app/node_modules/.vite
      - bootsnap_cache:/app/tmp/cache/bootsnap
      - gems_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - RAILS_ENV=development
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - ACTIVE_JOB_QUEUE_ADAPTER=sidekiq
      - ACTION_CABLE_ADAPTER=redis
      - RAILS_SERVE_STATIC_FILES=true
      - RAILS_LOG_TO_STDOUT=true
      - CW_API_ONLY_SERVER=false
      - FORCE_SSL=false
    depends_on:
      - redis
    entrypoint: docker/entrypoints/rails-dev.sh
    command: ["bundle", "exec", "rails", "server", "-b", "0.0.0.0", "-p", "3000"]
    stdin_open: true
    tty: true

  # Background job processor
  sidekiq:
    container_name: chatwoot_sidekiq_dev
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: chatwoot:development
    volumes:
      - .:/app
      - /app/node_modules
      - packs_data:/app/public/packs
      - vite_cache:/app/node_modules/.vite
      - bootsnap_cache:/app/tmp/cache/bootsnap
      - gems_cache:/usr/local/bundle
    env_file: .env
    environment:
      - RAILS_ENV=development
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - ACTIVE_JOB_QUEUE_ADAPTER=sidekiq
      - ACTION_CABLE_ADAPTER=redis
    depends_on:
      - redis
    entrypoint: docker/entrypoints/rails-dev.sh
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  # Vite development server for fast frontend builds
  vite:
    container_name: chatwoot_vite_dev
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: chatwoot:development
    volumes:
      - .:/app
      - /app/node_modules
      - packs_data:/app/public/packs
      - vite_cache:/app/node_modules/.vite
      - npm_cache:/root/.npm
    ports:
      - "3036:3036"
    env_file: .env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - VITE_DEV_SERVER_HOST=0.0.0.0
      - VITE_DEV_SERVER_PORT=3036
    entrypoint: docker/entrypoints/vite-dev.sh
    command: ["bundle", "exec", "vite", "dev"]

  # MailHog for email testing (keeping this local for development convenience)
  mailhog:
    container_name: chatwoot_mailhog_dev
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    restart: unless-stopped

  redis:
    container_name: chatwoot_redis_dev
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

# Named volumes for better performance and persistence
volumes:
  redis_data:
  packs_data:
  vite_cache:        # Persistent Vite build cache
  bootsnap_cache:    # Rails boot optimization cache
  gems_cache:        # Ruby gems cache
  npm_cache:         # npm package cache

# Networks (optional but good practice)
networks:
  default:
    name: chatwoot_dev_network 