version: '3.8'

services:
  # Base configuration for all Rails-based services
  base: &base
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
    image: chatwoot:dev
    env_file: .env
    environment:
      - RAILS_ENV=development
      - NODE_ENV=development
      - DATABASE_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-password}
      - VITE_DEV_SERVER_HOST=vite
    volumes:
      # Mount source code for live reloading (the key to fast iteration!)
      - ./:/app:cached
      # Use named volumes for dependencies to avoid Windows path issues
      - node_modules:/app/node_modules
      - bundle_cache:/usr/local/bundle
      # Persistent volumes for generated files
      - rails_cache:/app/tmp/cache
      - rails_storage:/app/storage
    depends_on:
      - postgres
      - redis

  # Main Rails application server
  rails:
    <<: *base
    container_name: chatwoot_rails_dev
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - vite  # Wait for Vite to be ready
    command: ["bundle", "exec", "rails", "server", "-b", "0.0.0.0", "-p", "3000"]
    stdin_open: true
    tty: true

  # Background job processor
  sidekiq:
    <<: *base
    container_name: chatwoot_sidekiq_dev
    depends_on:
      - postgres
      - redis
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  # Vite development server for fast frontend builds
  vite:
    <<: *base
    container_name: chatwoot_vite_dev
    ports:
      - "3036:3036"
    environment:
      - VITE_DEV_SERVER_HOST=0.0.0.0
      - VITE_DEV_SERVER_PORT=3036
      - NODE_ENV=development
    command: ["./node_modules/.bin/vite", "dev", "--host", "0.0.0.0", "--port", "3036"]
    depends_on: []  # Vite doesn't need database

  # PostgreSQL database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot_postgres_dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-chatwoot_dev}
      - POSTGRES_USER=${DATABASE_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and background jobs
  redis:
    image: redis:7-alpine
    container_name: chatwoot_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-password}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MailHog for email testing
  mailhog:
    image: mailhog/mailhog
    container_name: chatwoot_mailhog_dev
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

# Named volumes for better performance and persistence
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  node_modules:
    driver: local
  bundle_cache:
    driver: local
  rails_cache:
    driver: local
  rails_storage:
    driver: local

# Networks (optional but good practice)
networks:
  default:
    name: chatwoot_dev_network 