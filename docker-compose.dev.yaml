version: '3.8'

services:
  # Base configuration for all Rails-based services
  base: &base
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
    image: chatwoot:dev
    env_file: .env
    environment:
      - RAILS_ENV=development
      - NODE_ENV=development
      # Database and Redis connections will come from .env file pointing to Railway
      - VITE_DEV_SERVER_HOST=vite
    volumes:
      # Mount source code for live reloading (the key to fast iteration!)
      - ./:/app:cached
      # Use named volumes for dependencies to avoid Windows path issues
      - node_modules:/app/node_modules
      - bundle_cache:/usr/local/bundle
      # Persistent volumes for generated files
      - rails_cache:/app/tmp/cache
      - rails_storage:/app/storage
    # No dependencies on local postgres/redis since we're using Railway

  # Main Rails application server
  rails:
    <<: *base
    container_name: chatwoot_rails_dev
    ports:
      - "3000:3000"
    depends_on:
      - vite  # Wait for Vite to be ready
    command: ["bundle", "exec", "rails", "server", "-b", "0.0.0.0", "-p", "3000"]
    stdin_open: true
    tty: true

  # Background job processor
  sidekiq:
    <<: *base
    container_name: chatwoot_sidekiq_dev
    # No dependencies on local postgres/redis since we're using Railway
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  # Vite development server for fast frontend builds
  vite:
    <<: *base
    container_name: chatwoot_vite_dev
    ports:
      - "3036:3036"
    environment:
      - VITE_DEV_SERVER_HOST=0.0.0.0
      - VITE_DEV_SERVER_PORT=3036
      - NODE_ENV=development
    command: ["./node_modules/.bin/vite", "dev", "--host", "0.0.0.0", "--port", "3036"]
    depends_on: []  # Vite doesn't need database

  # MailHog for email testing (keeping this local for development convenience)
  mailhog:
    image: mailhog/mailhog
    container_name: chatwoot_mailhog_dev
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

# Named volumes for better performance and persistence
# Removed postgres_data and redis_data since we're using Railway
volumes:
  node_modules:
    driver: local
  bundle_cache:
    driver: local
  rails_cache:
    driver: local
  rails_storage:
    driver: local

# Networks (optional but good practice)
networks:
  default:
    name: chatwoot_dev_network 