services:
  rails:
    image: ruby:3.3.3-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - bundle_cache:/usr/local/bundle
      - node_modules:/app/node_modules
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - RAILS_ENV=development
      - NODE_ENV=development
      - BUNDLE_PATH=/usr/local/bundle
    command: >
      sh -c "
        apk add --no-cache build-base postgresql-dev nodejs npm git curl imagemagick &&
        npm install -g pnpm@10.2.0 &&
        bundle install &&
        if [ ! -d node_modules ]; then pnpm install; fi &&
        rm -f tmp/pids/server.pid &&
        bundle exec rails db:create db:migrate 2>/dev/null || bundle exec rails db:migrate &&
        bundle exec rails server -b 0.0.0.0 -p 3000
      "

  sidekiq:
    image: ruby:3.3.3-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      - RAILS_ENV=development
      - BUNDLE_PATH=/usr/local/bundle
    command: >
      sh -c "
        apk add --no-cache build-base postgresql-dev &&
        bundle install &&
        bundle exec sidekiq -C config/sidekiq.yml
      "

  vite:
    image: node:23-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    ports:
      - "3036:3036"
    environment:
      - NODE_ENV=development
      - VITE_DEV_SERVER_HOST=0.0.0.0
    command: >
      sh -c "
        npm install -g pnpm@10.2.0 &&
        pnpm install &&
        ./node_modules/.bin/vite dev
      "

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=railway
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=dkSdvSLYiDNQxjTsVQuTprARLaecAPmb

  redis:
    image: redis:alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    env_file: .env
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'

  mailhog:
    image: mailhog/mailhog
    ports:
      - 1025:1025
      - 8025:8025

volumes:
  postgres_data:
  redis_data:
  node_modules:
  bundle_cache:
