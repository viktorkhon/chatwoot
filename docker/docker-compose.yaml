services:
  base:
    image: vkhon00/my-chatwoot-base:latest

  rails:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.development
    image: chatwoot-rails-dev:latest
    volumes:
      - ./:/app:delegated
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle
    depends_on:
      - mailhog
    ports:
      - "3000:3000"
    env_file: .env.local
    environment:
      - NODE_ENV=development
      - RAILS_ENV=development
    command: ["/usr/local/bin/rails-dev.sh"]

  sidekiq:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.development
    image: chatwoot-sidekiq-dev:latest
    volumes:
      - ./:/app:delegated
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle
    depends_on:
      - mailhog
    env_file: .env.local
    environment:
      - NODE_ENV=development
      - RAILS_ENV=development
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  # Local PostgreSQL (only used when not using Railway)
  # Comment out this service if using Railway database
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      - '5432:5432'
    volumes:
      - postgres:/data/postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-railway}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    profiles:
      - local-db

  # Local Redis (only used when not using Railway)
  # Comment out this service if using Railway Redis
  redis:
    image: redis:alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    env_file: .env.local
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    volumes:
      - redis:/data/redis
    ports:
      - '6379:6379'
    profiles:
      - local-db

  mailhog:
    image: mailhog/mailhog
    ports:
      - 1025:1025
      - 8025:8025

volumes:
  postgres:
  redis:
  packs:
  cache:
  bundle:
